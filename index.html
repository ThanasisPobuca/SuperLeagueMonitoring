<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super League | Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Please enter your details to access the dashboard</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="e.g. admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div id="errorMessage" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;">
                Invalid credentials. Please try again.
            </div>
            <button type="submit" id="loginBtn">Sign In</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
